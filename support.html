<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coway Malaysia | 支持与反馈</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
            background-color: #fff;
            padding-top: 70px;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            padding: 15px 20px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo img { height: 28px; transition: transform 0.3s; }
        .logo img:hover { transform: scale(1.02); }
        .nav-menu { display: flex; gap: 35px; }
        .nav-menu a {
            text-decoration: none;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .nav-menu a:hover { color: #80abce; }
        .btn-order-nav {
            background: #80abce;
            color: #fff !important;
            padding: 8px 24px;
            border-radius: 40px;
            transition: all 0.3s;
        }
        .btn-order-nav:hover {
            background: #6a9ab8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(128,171,206,0.3);
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #555;
        }
        
        /* 移动端菜单 */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #fff;
            z-index: 1001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 70px 25px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .mobile-sidebar.open { right: 0; }
        .mobile-sidebar a {
            display: block;
            padding: 14px 0;
            color: #555;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #eee;
            transition: color 0.3s;
        }
        .mobile-sidebar a:hover { color: #80abce; }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 1000;
        }
        .overlay.show { display: block; }
        
        /* 轮播广告牌 */
        .carousel-banner {
            width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
        }
        .carousel-slides { width: 100%; height: 100%; position: relative; }
        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
        }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
        }
        .carousel-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
        }
        .carousel-content h2 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .carousel-content p { font-size: 18px; margin-bottom: 30px; text-shadow: 1px 1px 5px rgba(0,0,0,0.3); }
        .carousel-content a {
            background: #fff;
            color: #464646;
            padding: 10px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .carousel-content a:hover {
            background: #80abce;
            color: #fff;
            transform: translateY(-3px);
        }
        .carousel-dots {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .carousel-dot.active { background: #fff; width: 28px; border-radius: 5px; }
        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
            transition: all 0.3s;
        }
        .carousel-prev:hover, .carousel-next:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-50%) scale(1.05);
        }
        .carousel-prev { left: 20px; }
        .carousel-next { right: 20px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 留白区域 */
        .blank-section {
            background: #f9f9f9;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .blank-section h2 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .blank-section p {
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Feedback 表单区域 */
        .feedback-section {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .feedback-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .feedback-header h2 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .feedback-header p {
            color: #777;
        }
        .feedback-divider {
            width: 50px;
            height: 2px;
            background: #80abce;
            margin: 15px auto;
        }
        
        .feedback-form {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #80abce;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-submit {
            background: #80abce;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: #6a9ab8;
            transform: translateY(-2px);
        }
        
        /* 成功弹窗 */
        .success-toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            color: #fff;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            font-weight: 500;
            animation: fadeInUp 0.3s ease;
        }
        .success-toast.show {
            display: block;
        }
        
        /* 页脚 */
        footer {
            background: #2c3e50;
            color: #ccc;
            padding: 50px 20px 30px;
            text-align: center;
            margin-top: 40px;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #80abce;
        }
        .footer-divider {
            width: 60px;
            height: 2px;
            background: #80abce;
            margin: 20px auto;
            border-radius: 2px;
        }
        
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .mobile-menu-btn { display: block; }
            body { padding-top: 60px; }
            .carousel-content h2 { font-size: 28px; }
            .carousel-banner { height: 300px; }
            .feedback-form { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<div class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo"><img src="https://www.coway.com.my/img/coway-malaysia-logo.png" alt="Coway Malaysia"></a>
        <div class="nav-menu">
            <a href="list.html" class="btn-order-nav">Order Now</a>
            <a href="location.html">Locations</a>
            <a href="support.html">Support</a>
            <a href="#">Trade-In</a>
            <a href="#">About</a>
        </div>
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
    </div>
</div>

<div class="mobile-sidebar" id="sidebar">
    <a href="list.html">Order Now</a>
    <a href="location.html">Locations</a>
    <a href="support.html">Support</a>
    <a href="#">Trade-In</a>
    <a href="#">About</a>
</div>
<div class="overlay" id="overlay"></div>

<!-- 轮播广告牌 -->
<div class="carousel-banner">
    <div class="carousel-slides" id="carouselSlides"></div>
    <button class="carousel-prev" id="carouselPrev">‹</button>
    <button class="carousel-next" id="carouselNext">›</button>
    <div class="carousel-dots" id="carouselDots"></div>
</div>

<!-- 留白区域 -->
<div class="blank-section">
    <h2>💬 客户支持中心</h2>
    <p>我们致力于为您提供最优质的服务。如有任何疑问，请随时联系我们或填写以下表格，我们的客服团队会尽快回复您。</p>
</div>

<!-- Feedback 表单 -->
<div class="feedback-section">
    <div class="feedback-header">
        <h2>📝 意见反馈</h2>
        <div class="feedback-divider"></div>
        <p>告诉我们您的问题或建议，我们会尽快回复</p>
    </div>
    
    <form id="feedbackForm" class="feedback-form">
        <div class="form-group">
            <label>📱 手机号码 *</label>
            <input type="tel" id="feedbackPhone" placeholder="例如: 0123456789" required>
        </div>
        <div class="form-group">
            <label>📦 选择产品 *</label>
            <select id="feedbackProduct" required>
                <option value="">请选择产品</option>
                <option value="水机">💧 水机</option>
                <option value="空气净化器">🌬️ 空气净化器</option>
                <option value="冷气机">❄️ 冷气机</option>
                <option value="洗衣机">🧺 洗衣机</option>
                <option value="马桶">🚽 马桶</option>
                <option value="按摩椅">💆 按摩椅</option>
                <option value="按摩床">🛏️ 按摩床</option>
                <option value="床">🛌 床</option>
                <option value="其他">其他</option>
            </select>
        </div>
        <div class="form-group">
            <label>💬 您的反馈/问题 *</label>
            <textarea id="feedbackMessage" placeholder="请详细描述您的问题或建议..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">✉️ 提交反馈</button>
    </form>
</div>

<!-- 成功提示 -->
<div id="successToast" class="success-toast">✅ 反馈已提交，我们会尽快回复您！</div>

<!-- 页脚 -->
<footer>
    <div>
        <a href="terms.html">Terms of Use</a> • 
        <a href="privacy.html">Privacy Notice</a> • 
        <a href="#">Faq</a>
    </div>
    <div class="footer-divider"></div>
    <div>COWAY (MALAYSIA) © 2026. All Rights Reserved.</div>
</footer>

<script>
    // ========== 轮播广告数据 ==========
    let carouselData = [];
    let currentCarouselSlide = 0;
    let carouselInterval = null;
    
    function loadCarousel() {
        let saved = localStorage.getItem('coway_carousel');
        if (saved) {
            carouselData = JSON.parse(saved);
        } else {
            carouselData = [
                { id: 1, image: "https://www.coway.com.my/files/Banner/coway-air-purifier-for-every-space.jpg", title: "纯净空气，健康生活", desc: "Coway 空气净化器，为您的家庭提供最纯净的空气", link: "list.html" },
                { id: 2, image: "https://www.coway.com.my/files/Banner/coway-water-purifier-banner.jpg", title: "健康饮水，从Coway开始", desc: "荣获国际设计大奖的净水器系列", link: "list.html" },
                { id: 3, image: "https://www.coway.com.my/img/home/coway-virtual-showroom-tour.jpg", title: "Coway 虚拟展厅", desc: "360° 体验我们的创新产品", link: "list.html" }
            ];
            localStorage.setItem('coway_carousel', JSON.stringify(carouselData));
        }
        renderCarousel();
    }
    
    function renderCarousel() {
        const container = document.getElementById('carouselSlides');
        const dotsContainer = document.getElementById('carouselDots');
        if (!container || carouselData.length === 0) return;
        
        container.innerHTML = '';
        carouselData.forEach((item, idx) => {
            const slide = document.createElement('div');
            slide.className = `carousel-slide ${idx === currentCarouselSlide ? 'active' : ''}`;
            slide.style.backgroundImage = `url(${item.image})`;
            slide.innerHTML = `
                <div class="carousel-content">
                    <h2>${escapeHtml(item.title)}</h2>
                    <p>${escapeHtml(item.desc)}</p>
                    <a href="${item.link || '#'}">了解更多 →</a>
                </div>
            `;
            container.appendChild(slide);
        });
        
        dotsContainer.innerHTML = '';
        carouselData.forEach((_, idx) => {
            const dot = document.createElement('div');
            dot.className = `carousel-dot ${idx === currentCarouselSlide ? 'active' : ''}`;
            dot.onclick = () => { goToCarouselSlide(idx); resetCarouselAutoPlay(); };
            dotsContainer.appendChild(dot);
        });
        
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => { nextCarouselSlide(); }, 5000);
    }
    
    function updateCarouselDisplay() {
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        slides.forEach((s, i) => s.classList.toggle('active', i === currentCarouselSlide));
        dots.forEach((d, i) => d.classList.toggle('active', i === currentCarouselSlide));
    }
    
    function nextCarouselSlide() {
        if (carouselData.length === 0) return;
        currentCarouselSlide = (currentCarouselSlide + 1) % carouselData.length;
        updateCarouselDisplay();
    }
    
    function prevCarouselSlide() {
        if (carouselData.length === 0) return;
        currentCarouselSlide = (currentCarouselSlide - 1 + carouselData.length) % carouselData.length;
        updateCarouselDisplay();
    }
    
    function goToCarouselSlide(idx) {
        currentCarouselSlide = idx;
        updateCarouselDisplay();
    }
    
    function resetCarouselAutoPlay() {
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => { nextCarouselSlide(); }, 5000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Feedback 提交
    const feedbackForm = document.getElementById('feedbackForm');
    const successToast = document.getElementById('successToast');
    
    feedbackForm?.addEventListener('submit', (e) => {
        e.preventDefault();
        const phone = document.getElementById('feedbackPhone').value;
        const product = document.getElementById('feedbackProduct').value;
        const message = document.getElementById('feedbackMessage').value;
        
        if (!phone || !product || !message) {
            alert('请填写所有必填字段');
            return;
        }
        
        // 保存到 localStorage
        let feedbacks = localStorage.getItem('coway_feedbacks');
        if (feedbacks) {
            feedbacks = JSON.parse(feedbacks);
        } else {
            feedbacks = [];
        }
        
        feedbacks.unshift({
            id: Date.now(),
            phone: phone,
            product: product,
            message: message,
            status: 'pending',
            createdAt: new Date().toISOString()
        });
        
        localStorage.setItem('coway_feedbacks', JSON.stringify(feedbacks));
        
        // 显示成功提示
        successToast.classList.add('show');
        setTimeout(() => {
            successToast.classList.remove('show');
        }, 3000);
        
        // 重置表单
        feedbackForm.reset();
    });
    
    // 移动端菜单
    document.getElementById('menuBtn')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    });
    
    document.getElementById('carouselPrev')?.addEventListener('click', () => { prevCarouselSlide(); resetCarouselAutoPlay(); });
    document.getElementById('carouselNext')?.addEventListener('click', () => { nextCarouselSlide(); resetCarouselAutoPlay(); });
    
    loadCarousel();
</script>

</body>
</html>
