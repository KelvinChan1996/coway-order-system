<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coway Malaysia | 支持与反馈</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .carousel-banner {
            width: 100%;
            height: 380px;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .carousel-slides { width: 100%; height: 100%; position: relative; }
        .carousel-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 0.8s;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: #fff;
        }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
        }
        .carousel-content { position: relative; z-index: 2; max-width: 800px; padding: 20px; }
        .carousel-content h2 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .carousel-content p { font-size: 18px; margin-bottom: 30px; }
        .carousel-content a {
            background: #fff; color: #2c3e50; padding: 12px 36px; border-radius: 40px;
            text-decoration: none; font-weight: 600; display: inline-block;
        }
        .carousel-content a:hover { background: #80abce; color: #fff; }
        .carousel-dots {
            position: absolute; bottom: 25px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        .carousel-dot {
            width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5);
            cursor: pointer; transition: all 0.3s;
        }
        .carousel-dot.active { background: #fff; width: 28px; border-radius: 5px; }
        .carousel-prev, .carousel-next {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); color: #fff; border: none; border-radius: 50%;
            cursor: pointer; font-size: 24px; z-index: 10;
        }
        .carousel-prev { left: 25px; }
        .carousel-next { right: 25px; }
        
        .blank-section {
            background: #f9f9f9; padding: 60px 20px; text-align: center;
            border-bottom: 1px solid #eee;
        }
        .blank-section h2 { font-size: 28px; color: #2c3e50; margin-bottom: 20px; }
        .blank-section p { color: #666; max-width: 600px; margin: 0 auto; }
        
        .feedback-section { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        .feedback-header { text-align: center; margin-bottom: 30px; }
        .feedback-header h2 { font-size: 28px; color: #2c3e50; margin-bottom: 10px; }
        .feedback-header p { color: #777; }
        .feedback-divider { width: 50px; height: 2px; background: #80abce; margin: 15px auto; }
        
        .feedback-form {
            background: #fff; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 14px; transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #80abce;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .btn-submit {
            background: #80abce; color: #fff; border: none; padding: 14px;
            border-radius: 40px; width: 100%; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-submit:hover { background: #6a9ab8; transform: translateY(-2px); }
        
        .success-toast {
            display: none; position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: #27ae60; color: #fff;
            padding: 12px 24px; border-radius: 40px; z-index: 2000;
            font-weight: 500; animation: fadeInUp 0.3s ease;
        }
        .success-toast.show { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            .carousel-content h2 { font-size: 28px; }
            .carousel-banner { height: 300px; }
            .feedback-form { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="carousel-banner">
        <div class="carousel-slides" id="carouselSlides"></div>
        <button class="carousel-prev" id="carouselPrev">‹</button>
        <button class="carousel-next" id="carouselNext">›</button>
        <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <div class="blank-section">
        <h2>💬 客户支持中心</h2>
        <p>我们致力于为您提供最优质的服务。如有任何疑问，请随时联系我们或填写以下表格，我们的客服团队会尽快回复您。</p>
    </div>

    <div class="feedback-section">
        <div class="feedback-header">
            <h2>📝 意见反馈</h2>
            <div class="feedback-divider"></div>
            <p>告诉我们您的问题或建议，我们会尽快回复</p>
        </div>
        
        <form id="feedbackForm" class="feedback-form">
            <div class="form-group">
                <label>📱 手机号码 *</label>
                <input type="tel" id="feedbackPhone" placeholder="例如: 0123456789" required>
            </div>
            <div class="form-group">
                <label>📦 选择产品 *</label>
                <select id="feedbackProduct" required>
                    <option value="">请选择产品</option>
                    <option value="水机">💧 水机</option>
                    <option value="空气净化器">🌬️ 空气净化器</option>
                    <option value="冷气机">❄️ 冷气机</option>
                    <option value="洗衣机">🧺 洗衣机</option>
                    <option value="马桶">🚽 马桶</option>
                    <option value="按摩椅">💆 按摩椅</option>
                    <option value="按摩床">🛏️ 按摩床</option>
                    <option value="床">🛌 床</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>💬 您的反馈/问题 *</label>
                <textarea id="feedbackMessage" placeholder="请详细描述您的问题或建议..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">✉️ 提交反馈</button>
        </form>
    </div>

    <div id="successToast" class="success-toast">✅ 反馈已提交，我们会尽快回复您！</div>

    <script src="js/layout2.js"></script>
    <script>
        let carouselData = [];
        let currentCarouselSlide = 0;
        let carouselInterval = null;
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]);
        }
        
        function loadCarousel() {
            let saved = localStorage.getItem('coway_carousel');
            carouselData = saved ? JSON.parse(saved) : [
                { id: 1, image: "https://www.coway.com.my/files/Banner/coway-air-purifier-for-every-space.jpg", title: "纯净空气，健康生活", desc: "Coway 空气净化器，为您的家庭提供最纯净的空气", link: "list.html" },
                { id: 2, image: "https://www.coway.com.my/files/Banner/coway-water-purifier-banner.jpg", title: "健康饮水，从Coway开始", desc: "荣获国际设计大奖的净水器系列", link: "list.html" },
                { id: 3, image: "https://www.coway.com.my/img/home/coway-virtual-showroom-tour.jpg", title: "Coway 虚拟展厅", desc: "360° 体验我们的创新产品", link: "list.html" }
            ];
            if (!saved) localStorage.setItem('coway_carousel', JSON.stringify(carouselData));
            renderCarousel();
        }
        
        function renderCarousel() {
            const container = document.getElementById('carouselSlides');
            const dots = document.getElementById('carouselDots');
            if (!container) return;
            container.innerHTML = '';
            carouselData.forEach((item, i) => {
                const slide = document.createElement('div');
                slide.className = `carousel-slide ${i === currentCarouselSlide ? 'active' : ''}`;
                slide.style.backgroundImage = `url(${item.image})`;
                slide.innerHTML = `<div class="carousel-content"><h2>${escapeHtml(item.title)}</h2><p>${escapeHtml(item.desc)}</p><a href="${item.link || '#'}">了解更多 →</a></div>`;
                container.appendChild(slide);
            });
            dots.innerHTML = '';
            carouselData.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `carousel-dot ${i === currentCarouselSlide ? 'active' : ''}`;
                dot.onclick = () => { currentCarouselSlide = i; updateCarouselDisplay(); resetAutoPlay(); };
                dots.appendChild(dot);
            });
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 5000);
        }
        
        function updateCarouselDisplay() {
            document.querySelectorAll('.carousel-slide').forEach((s, i) => s.classList.toggle('active', i === currentCarouselSlide));
            document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === currentCarouselSlide));
        }
        
        function nextSlide() { if (carouselData.length) { currentCarouselSlide = (currentCarouselSlide + 1) % carouselData.length; updateCarouselDisplay(); } }
        function prevSlide() { if (carouselData.length) { currentCarouselSlide = (currentCarouselSlide - 1 + carouselData.length) % carouselData.length; updateCarouselDisplay(); } }
        function resetAutoPlay() { if (carouselInterval) clearInterval(carouselInterval); carouselInterval = setInterval(nextSlide, 5000); }
        
        const feedbackForm = document.getElementById('feedbackForm');
        const successToast = document.getElementById('successToast');
        
        feedbackForm?.addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('feedbackPhone').value;
            const product = document.getElementById('feedbackProduct').value;
            const message = document.getElementById('feedbackMessage').value;
            if (!phone || !product || !message) { alert('请填写所有必填字段'); return; }
            let feedbacks = JSON.parse(localStorage.getItem('coway_feedbacks') || '[]');
            feedbacks.unshift({ id: Date.now(), phone, product, message, status: 'pending', createdAt: new Date().toISOString() });
            localStorage.setItem('coway_feedbacks', JSON.stringify(feedbacks));
            successToast.classList.add('show');
            setTimeout(() => successToast.classList.remove('show'), 3000);
            feedbackForm.reset();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCarousel();
            document.getElementById('carouselPrev')?.addEventListener('click', () => { prevSlide(); resetAutoPlay(); });
            document.getElementById('carouselNext')?.addEventListener('click', () => { nextSlide(); resetAutoPlay(); });
        });
    </script>
</body>
</html>
