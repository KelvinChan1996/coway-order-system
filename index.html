<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coway Malaysia | 健康生活领导者</title>
    <meta name="description" content="Coway Malaysia - 水机、空气净化器、冷气、家电，在线下单，系统自动分配Agent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            color: #333;
            background-color: #fff;
            padding-top: 70px;
        }
        
        /* ========== 导航栏 ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            z-index: 1000;
            padding: 15px 20px;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo img {
            height: 32px;
            transition: transform 0.3s;
        }
        .logo img:hover {
            transform: scale(1.02);
        }
        .nav-menu {
            display: flex;
            gap: 35px;
        }
        .nav-menu a {
            text-decoration: none;
            color: #555;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .nav-menu a:hover {
            color: #80abce;
        }
        .btn-order-nav {
            background: #80abce;
            color: #fff !important;
            padding: 8px 24px;
            border-radius: 40px;
            transition: all 0.3s;
        }
        .btn-order-nav:hover {
            background: #6a9ab8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(128,171,206,0.3);
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #555;
        }
        
        /* 移动端菜单 */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #fff;
            z-index: 1001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 70px 25px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
        }
        .mobile-sidebar.open { right: 0; }
        .mobile-sidebar a {
            display: block;
            padding: 14px 0;
            color: #555;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #eee;
            transition: color 0.3s;
        }
        .mobile-sidebar a:hover { color: #80abce; }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 1000;
        }
        .overlay.show { display: block; }
        
        /* ========== 轮播广告牌（美化） ========== */
        .carousel-banner {
            width: 100%;
            height: 550px;
            position: relative;
            overflow: hidden;
        }
        .carousel-slides {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
        }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
        }
        .carousel-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
        }
        .carousel-content h2 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        .carousel-content p {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }
        .carousel-content a {
            background: #fff;
            color: #333;
            padding: 12px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
        }
        .carousel-content a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #80abce;
            color: #fff;
        }
        
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .carousel-dot.active {
            background: #fff;
            width: 28px;
            border-radius: 5px;
        }
        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            z-index: 10;
            transition: all 0.3s;
        }
        .carousel-prev:hover, .carousel-next:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-50%) scale(1.05);
        }
        .carousel-prev { left: 30px; }
        .carousel-next { right: 30px; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ========== Notice 公告区（美化） ========== */
        .notice-section {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }
        .notice-header h2 {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
            position: relative;
            padding-left: 20px;
        }
        .notice-header h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 30px;
            background: #80abce;
            border-radius: 3px;
        }
        .notice-header h2 i {
            color: #80abce;
            margin-right: 10px;
        }
        .admin-link {
            background: #f5f5f5;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .admin-link:hover {
            background: #80abce;
            color: #fff;
            transform: translateY(-2px);
        }
        
        .notice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .notice-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #f0f0f0;
        }
        .notice-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #80abce;
        }
        .notice-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .notice-card:hover .notice-img {
            transform: scale(1.03);
        }
        .notice-content { padding: 22px; }
        .notice-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .notice-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .notice-date {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .empty-notice {
            text-align: center;
            padding: 80px;
            color: #999;
            background: #fafafa;
            border-radius: 24px;
        }
        
        /* ========== 统计区域（美化） ========== */
        .stats-section {
            background: linear-gradient(135deg, #7ba9c7, #90bbd4);
            color: #fff;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stats-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1%, transparent 1%);
            background-size: 50px 50px;
            animation: moveBg 60s linear infinite;
        }
        @keyframes moveBg {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }
        .stats-section h2 {
            font-size: 44px;
            font-weight: 700;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }
        .stats-section > p {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }
        .stats-grid {
            display: flex;
            justify-content: center;
            gap: 80px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .stat-item {
            text-align: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            min-width: 140px;
            transition: transform 0.3s;
        }
        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        .stat-number {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 15px;
            opacity: 0.9;
        }
        
        /* ========== 页脚（美化） ========== */
        footer {
            background: #2c3e50;
            color: #ccc;
            padding: 50px 20px 30px;
            text-align: center;
        }
        footer a {
            color: #aaa;
            text-decoration: none;
            margin: 0 12px;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #80abce;
        }
        .footer-divider {
            width: 60px;
            height: 2px;
            background: #80abce;
            margin: 20px auto;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .carousel-banner { height: 400px; }
            .carousel-content h2 { font-size: 32px; }
            .carousel-content p { font-size: 16px; }
            .stats-section h2 { font-size: 32px; }
            .stats-grid { gap: 20px; }
            .stat-item { padding: 15px 20px; min-width: 110px; }
            .stat-number { font-size: 32px; }
        }
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .mobile-menu-btn { display: block; }
            body { padding-top: 60px; }
            .notice-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .notice-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<div class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <img src="https://www.coway.com.my/img/coway-malaysia-logo.png" alt="Coway Malaysia">
        </a>
        <div class="nav-menu">
    <a href="list.html" class="btn-order-nav">Order Now</a>
    <a href="location.html">Locations</a>
    <a href="support.html">Support</a>
    <a href="about.html">About Us</a>
    <a href="#">About</a>
</div>
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
    </div>
</div>

<!-- 移动端侧边栏 -->
<div class="mobile-sidebar" id="sidebar">
    <a href="list.html">Order Now</a>
    <a href="#">Service</a>
    <a href="#">Trade-In</a>
    <a href="#">About</a>
    <a href="#">Support</a>
</div>
<div class="overlay" id="overlay"></div>

<!-- 轮播广告牌 -->
<div class="carousel-banner">
    <div class="carousel-slides" id="carouselSlides"></div>
    <button class="carousel-prev" id="carouselPrev">‹</button>
    <button class="carousel-next" id="carouselNext">›</button>
    <div class="carousel-dots" id="carouselDots"></div>
</div>

<!-- Notice 公告区 -->
<div class="notice-section">
    <div class="notice-header">
        <h2><i>🎉</i> 最新优惠与公告</h2>
        <a href="admin.html" class="admin-link">🔐 管理公告</a>
    </div>
    <div id="noticeContainer" class="notice-grid">
        <div class="empty-notice">加载中...</div>
    </div>
</div>


<!-- 页脚 -->
<footer>
    <div>
        <a href="terms.html">Terms of Use</a> • 
        <a href="privacy.html">Privacy Notice</a>
        <a href="#">Faq</a>
    </div>
    <div class="footer-divider"></div>
    <div>COWAY (MALAYSIA) © 2026. All Rights Reserved.</div>
</footer>

<script>
    // ========== 加载轮播广告 ==========
    let carouselData = [];
    let currentCarouselSlide = 0;
    let carouselInterval = null;
    
    function loadCarousel() {
        let saved = localStorage.getItem('coway_carousel');
        if (saved) {
            carouselData = JSON.parse(saved);
        } else {
            carouselData = [
                { id: 1, image: "https://www.coway.com.my/files/Banner/coway-air-purifier-for-every-space.jpg", title: "纯净空气，健康生活", desc: "Coway 空气净化器，为您的家庭提供最纯净的空气", link: "list.html" },
                { id: 2, image: "https://www.coway.com.my/files/Banner/coway-water-purifier-banner.jpg", title: "健康饮水，从Coway开始", desc: "荣获国际设计大奖的净水器系列", link: "list.html" },
                { id: 3, image: "https://www.coway.com.my/img/home/coway-virtual-showroom-tour.jpg", title: "Coway 虚拟展厅", desc: "360° 体验我们的创新产品", link: "list.html" }
            ];
            localStorage.setItem('coway_carousel', JSON.stringify(carouselData));
        }
        renderCarousel();
    }
    
    function renderCarousel() {
        const container = document.getElementById('carouselSlides');
        const dotsContainer = document.getElementById('carouselDots');
        if (!container || carouselData.length === 0) return;
        
        container.innerHTML = '';
        carouselData.forEach((item, idx) => {
            const slide = document.createElement('div');
            slide.className = `carousel-slide ${idx === currentCarouselSlide ? 'active' : ''}`;
            slide.style.backgroundImage = `url(${item.image})`;
            slide.innerHTML = `
                <div class="carousel-content">
                    <h2>${escapeHtml(item.title)}</h2>
                    <p>${escapeHtml(item.desc)}</p>
                    <a href="${item.link || '#'}">了解更多 →</a>
                </div>
            `;
            container.appendChild(slide);
        });
        
        dotsContainer.innerHTML = '';
        carouselData.forEach((_, idx) => {
            const dot = document.createElement('div');
            dot.className = `carousel-dot ${idx === currentCarouselSlide ? 'active' : ''}`;
            dot.onclick = () => { goToCarouselSlide(idx); resetCarouselAutoPlay(); };
            dotsContainer.appendChild(dot);
        });
        
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => { nextCarouselSlide(); }, 6000);
    }
    
    function updateCarouselDisplay() {
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        slides.forEach((s, i) => s.classList.toggle('active', i === currentCarouselSlide));
        dots.forEach((d, i) => d.classList.toggle('active', i === currentCarouselSlide));
    }
    
    function nextCarouselSlide() {
        if (carouselData.length === 0) return;
        currentCarouselSlide = (currentCarouselSlide + 1) % carouselData.length;
        updateCarouselDisplay();
    }
    
    function prevCarouselSlide() {
        if (carouselData.length === 0) return;
        currentCarouselSlide = (currentCarouselSlide - 1 + carouselData.length) % carouselData.length;
        updateCarouselDisplay();
    }
    
    function goToCarouselSlide(idx) {
        currentCarouselSlide = idx;
        updateCarouselDisplay();
    }
    
    function resetCarouselAutoPlay() {
        if (carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => { nextCarouselSlide(); }, 6000);
    }
    
    // ========== 加载公告 ==========
    function loadNotices() {
        const container = document.getElementById('noticeContainer');
        let notices = localStorage.getItem('coway_notices');
        if (notices) {
            notices = JSON.parse(notices);
        } else {
            notices = [
                { id: 1, title: "🎊 开斋节特别优惠！", description: "购买任何水机/空气净化器，可获免费滤芯一套 + 延长保修1年。优惠至2026年5月31日。", image: "https://placehold.co/600x400/80abce/white?text=Raya+Promo", date: "2026-04-01" },
                { id: 2, title: "💧 水机以旧换新计划", description: "任何品牌旧水机，换购Coway水机可享RM200折扣。", image: "https://placehold.co/600x400/80abce/white?text=Trade+In", date: "2026-03-15" },
                { id: 3, title: "🌬️ 空气净化器免费试用", description: "30天免费试用，不满意全额退款。", image: "https://placehold.co/600x400/80abce/white?text=Free+Trial", date: "2026-04-10" }
            ];
            localStorage.setItem('coway_notices', JSON.stringify(notices));
        }
        
        if (notices.length === 0) {
            container.innerHTML = '<div class="empty-notice">📢 暂无公告，请稍后再来</div>';
            return;
        }
        
        container.innerHTML = '';
        notices.forEach(notice => {
            const card = document.createElement('div');
            card.className = 'notice-card';
            card.innerHTML = `
                <img class="notice-img" src="${notice.image}" alt="${notice.title}" onerror="this.src='https://placehold.co/600x400/cccccc/white?text=No+Image'">
                <div class="notice-content">
                    <div class="notice-title">${escapeHtml(notice.title)}</div>
                    <div class="notice-desc">${escapeHtml(notice.description)}</div>
                    <div class="notice-date"><span>📅</span> ${notice.date}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 移动端菜单
    document.getElementById('menuBtn')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    });
    
    document.getElementById('carouselPrev')?.addEventListener('click', () => { prevCarouselSlide(); resetCarouselAutoPlay(); });
    document.getElementById('carouselNext')?.addEventListener('click', () => { nextCarouselSlide(); resetCarouselAutoPlay(); });
    
    // 初始化
    loadCarousel();
    loadNotices();
</script>

</body>
</html>
