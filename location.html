<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coway Malaysia | 门店位置</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .page-header {
            text-align: center;
            margin: 40px 20px 30px;
        }
        .page-header h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .page-header p {
            color: #777;
        }
        .header-divider {
            width: 60px;
            height: 3px;
            background: #80abce;
            margin: 15px auto;
            border-radius: 3px;
        }
        
        .locations-container {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .location-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .location-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        
        .location-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e0e0e0;
        }
        
        .location-info {
            padding: 20px;
            flex: 1;
        }
        .location-name {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .location-name i {
            color: #80abce;
        }
        .location-address {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
            padding-left: 26px;
        }
        .location-hours {
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
            padding-left: 26px;
        }
        .location-phone {
            color: #80abce;
            font-size: 14px;
            margin-bottom: 15px;
            padding-left: 26px;
        }
        .location-phone a {
            color: #80abce;
            text-decoration: none;
        }
        
        .waze-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1da1f2;
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            margin-top: 10px;
            width: fit-content;
        }
        .waze-link:hover {
            background: #0d8bdc;
            transform: translateY(-2px);
        }
        
        .empty-locations {
            text-align: center;
            padding: 60px;
            background: #fff;
            border-radius: 20px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .page-header h1 { font-size: 28px; }
            .locations-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1>📍 Our Locations</h1>
    <div class="header-divider"></div>
    <p>Find the nearest Coway experience centre near you</p>
</div>

<div id="locationsContainer" class="locations-container">
    <div class="empty-locations">加载中...</div>
</div>

<script src="js/layout2.js"></script>
<script>
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]);
    }
    
    function loadLocations() {
        const container = document.getElementById('locationsContainer');
        let locations = localStorage.getItem('coway_locations');
        
        if (locations) {
            locations = JSON.parse(locations);
        } else {
            locations = [
                {
                    id: 1,
                    name: "Coway Experience Centre KL",
                    image: "https://placehold.co/600x400/80abce/white?text=KL+Centre",
                    address: "Wisma UOA II, Jalan Pinang, Kuala Lumpur",
                    hours: "Mon-Fri: 10am-7pm, Sat: 10am-2pm",
                    phone: "1800-888-111",
                    wazeLink: "https://waze.com/ul?ll=3.1585,101.7156&navigate=yes"
                },
                {
                    id: 2,
                    name: "Coway PJ Showroom",
                    image: "https://placehold.co/600x400/80abce/white?text=PJ+Showroom",
                    address: "Lot 1-03, Jalan SS2/72, Petaling Jaya, Selangor",
                    hours: "Mon-Sat: 10am-6pm, Sun: Closed",
                    phone: "1800-888-111",
                    wazeLink: "https://waze.com/ul?ll=3.1185,101.6245&navigate=yes"
                },
                {
                    id: 3,
                    name: "Coway JB Branch",
                    image: "https://placehold.co/600x400/80abce/white?text=JB+Branch",
                    address: "No 15, Jalan Bestari 1/5, Taman Bestari Indah, Johor Bahru",
                    hours: "Mon-Fri: 9am-6pm, Sat: 9am-1pm",
                    phone: "1800-888-111",
                    wazeLink: "https://waze.com/ul?ll=1.4927,103.7413&navigate=yes"
                }
            ];
            localStorage.setItem('coway_locations', JSON.stringify(locations));
        }
        
        if (locations.length === 0) {
            container.innerHTML = '<div class="empty-locations">暂无门店信息，请稍后再来</div>';
            return;
        }
        
        container.innerHTML = '';
        locations.forEach(loc => {
            const card = document.createElement('div');
            card.className = 'location-card';
            card.innerHTML = `
                <img class="location-image" src="${loc.image}" alt="${escapeHtml(loc.name)}" onerror="this.src='https://placehold.co/600x400/cccccc/white?text=No+Image'">
                <div class="location-info">
                    <div class="location-name"><i>📍</i> ${escapeHtml(loc.name)}</div>
                    <div class="location-address"><i>🏠</i> ${escapeHtml(loc.address)}</div>
                    <div class="location-hours"><i>⏰</i> ${escapeHtml(loc.hours)}</div>
                    <div class="location-phone"><i>📞</i> <a href="tel:${loc.phone}">${loc.phone}</a></div>
                    <a href="${loc.wazeLink}" target="_blank" class="waze-link"><i>🗺️</i> Navigate with Waze</a>
                </div>
            `;
            container.appendChild(card);
        });
    }
    
    loadLocations();
</script>
</body>
</html>
