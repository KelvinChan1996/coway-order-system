<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coway Malaysia | 门店位置</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .page-header {
            text-align: center;
            margin: 40px 20px 30px;
        }
        .page-header h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .page-header p { color: #777; }
        .header-divider {
            width: 60px; height: 3px;
            background: #80abce;
            margin: 15px auto;
            border-radius: 3px;
        }
        .locations-container {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        .location-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .location-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }
        .location-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e0e0e0;
        }
        .location-info { padding: 20px; flex: 1; }
        .location-name {
            font-size: 20px; font-weight: 700; color: #2c3e50;
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        .location-address {
            color: #666; font-size: 14px; line-height: 1.5;
            margin-bottom: 12px; padding-left: 26px;
        }
        .location-hours {
            color: #888; font-size: 13px; margin-bottom: 15px; padding-left: 26px;
        }
        .location-phone {
            color: #80abce; font-size: 14px; margin-bottom: 15px; padding-left: 26px;
        }
        .location-phone a { color: #80abce; text-decoration: none; }
        .waze-link {
            display: inline-flex; align-items: center; gap: 8px;
            background: #1da1f2; color: #fff; padding: 10px 20px;
            border-radius: 40px; text-decoration: none; font-weight: 600;
            font-size: 14px; transition: all 0.3s; margin-top: 10px; width: fit-content;
        }
        .waze-link:hover { background: #0d8bdc; transform: translateY(-2px); }
        .empty-locations {
            text-align: center; padding: 60px; background: #fff;
            border-radius: 20px; color: #999;
        }
        @media (max-width: 768px) {
            .page-header h1 { font-size: 28px; }
            .locations-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <h1 data-i18n="locations.title">Our Locations</h1>
    <div class="header-divider"></div>
    <p data-i18n="locations.subtitle">Find the nearest Coway experience centre near you</p>
</div>

<div id="locationsContainer" class="locations-container">
    <div class="empty-locations" data-i18n="common.loading">加载中...</div>
</div>

<script src="js/i18n.js"></script>
<script src="js/layout2.js"></script>
<script src="js/location.js"></script>
</body>
</html>
